<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CDX - Campeonato Legend Online</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Barra de Navegação -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar-content">
        <div class="tournament-selector">
          <select id="edition-select" class="tournament-select">
            <!-- Populado dinamicamente pelo scripts.js -->
          </select>
        </div>
        <div class="social-links">
          <a href="https://www.youtube.com" target="_blank" class="social-link"><i class="fab fa-youtube"></i></a>
          <a href="https://www.instagram.com" target="_blank" class="social-link"><i class="fab fa-instagram"></i></a>
          <a href="https://discord.gg/7guqujEpTK" target="_blank" class="social-link discord-btn"><i class="fab fa-discord"></i></a>
          <a href="https://wa.me/447375637380" target="_blank" class="social-link whatsapp-btn"><i class="fab fa-whatsapp"></i> Contato</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero Section com Parallax -->
  <section class="hero">
    <div class="parallax-bg" style="background-image: url('poster.png');"></div>
    <div class="svg-parallax"></div>
    <div class="hero-content">
      <h1 id="hero-title" class="hero-title">Campeonato Legend Online</h1>
      <p id="hero-subtitle" class="hero-subtitle">Competição oficial de Legend Online</p>
      <a href="#content" class="hero-cta">Ver Lutas <i class="fas fa-arrow-right"></i></a>
    </div>
  </section>

  <!-- Conteúdo Principal - Renderizado dinamicamente -->
  <section id="content" class="tabs-section">
    <div class="container">

      <!-- Tabs: Realizadas / Pendentes / Classificação -->
      <div class="tabs-container">
        <div class="tab-buttons">
          <button class="tab-button active" data-tab="tab-realizadas"><i class="fas fa-check-circle"></i> Lutas Realizadas</button>
          <button class="tab-button" data-tab="tab-pendentes"><i class="fas fa-clock"></i> Lutas Pendentes</button>
          <button class="tab-button" data-tab="tab-classificacao"><i class="fas fa-chart-line"></i> Classificação</button>
        </div>

        <!-- Tab: Lutas Realizadas -->
        <div id="tab-realizadas" class="tab-content active">
          <div id="matches-complete"></div>
        </div>

        <!-- Tab: Lutas Pendentes -->
        <div id="tab-pendentes" class="tab-content">
          <div id="matches-pending"></div>
        </div>

        <!-- Tab: Classificação -->
        <div id="tab-classificacao" class="tab-content">
          <div id="standings-container"></div>
        </div>
      </div>

      <!-- Link Challonge -->
      <div id="challonge-link" class="challonge-link" style="display:none;">
        <a href="" target="_blank" id="challonge-url">
          <i class="fas fa-external-link-alt"></i> Ver chave completa no Challonge
        </a>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-logo">
          <img src="logotipo.png" alt="Logo Legend Online" class="footer-logo-img">
          <p>&copy; 2025-2026 Campeonato Legend Online - Todos os direitos reservados</p>
        </div>
        <div class="footer-links">
          <div class="footer-social">
            <h3>Redes Sociais</h3>
            <div class="social-icons">
              <a href="https://www.youtube.com" target="_blank" class="social-icon"><i class="fab fa-youtube"></i> YouTube</a>
              <a href="https://www.instagram.com" target="_blank" class="social-icon"><i class="fab fa-instagram"></i> Instagram</a>
              <a href="https://discord.gg/7guqujEpTK" target="_blank" class="social-icon"><i class="fab fa-discord"></i> Discord</a>
            </div>
          </div>
          <div class="footer-contact">
            <h3>Contato</h3>
            <a href="https://wa.me/447375637380" target="_blank" class="whatsapp-button">
              <i class="fab fa-whatsapp"></i> Fale conosco pelo WhatsApp
            </a>
          </div>
        </div>
      </div>
    </div>
  </footer>

  <!-- WhatsApp Floating Button -->
  <a href="https://wa.me/447375637380" target="_blank" class="whatsapp-float">
    <i class="fab fa-whatsapp"></i>
  </a>

  <!-- Scripts -->
  <script src="scripts.js"></script>
</body>
</html>
